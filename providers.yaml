# Provider Configuration for KYC Document Processor
# Defines all supported LLM vision providers and processing settings.

default_provider: "openrouter"

providers:
  parasail:
    name: "Parasail.io"
    base_url: "https://api.parasail.io/v1"
    api_key_env: "PARASAIL_API_KEY"
    default_model: "Qwen/Qwen2.5-VL-72B-Instruct"
    supported_models:
      - "Qwen/Qwen2.5-VL-72B-Instruct"
      - "Qwen/Qwen2-VL-72B-Instruct"
    features:
      vision: true
      streaming: true
      function_calling: false
    pricing:
      input_tokens_per_million: 0.0
      output_tokens_per_million: 0.0
    notes: "OpenAI-compatible API with free-tier access to select models"

  openrouter:
    name: "OpenRouter.ai"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    default_model: "qwen/qwen2.5-vl-72b-instruct"
    supported_models:
      - "qwen/qwen2.5-vl-72b-instruct"
      - "qwen/qwen2.5-vl-32b-instruct"
      - "openai/gpt-4o"
      - "openai/gpt-4o-mini"
      - "anthropic/claude-sonnet-4-20250514"
      - "google/gemini-2.0-flash-001"
      - "google/gemini-2.5-pro-preview"
      - "meta-llama/llama-4-maverick-instruct"
    features:
      vision: true
      streaming: true
      function_calling: true
      auto_fallback: true
    additional_headers:
      http_referer_env: "OPENROUTER_SITE_URL_env"
      x_title_env: "OPENROUTER_APP_NAME_env"
    pricing:
      input_tokens_per_million: 0.10
      output_tokens_per_million: 0.42
    notes: "Unified API for 300+ models with automatic provider fallback"

  openai:
    name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    default_model: "gpt-4o"
    supported_models:
      - "gpt-4o"
      - "gpt-4o-mini"
      - "gpt-4-turbo"
    features:
      vision: true
      streaming: true
      function_calling: true
    pricing:
      input_tokens_per_million: 2.50
      output_tokens_per_million: 10.00
    notes: "Official OpenAI API — high quality, higher cost"

  google:
    name: "Google Gemini"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    api_key_env: "GOOGLE_API_KEY"
    default_model: "gemini-2.0-flash"
    supported_models:
      - "gemini-2.5-pro-preview-05-06"
      - "gemini-2.5-flash"
      - "gemini-2.0-flash"
      - "gemini-2.0-flash-lite"
    features:
      vision: true
      streaming: true
      function_calling: true
    pricing:
      input_tokens_per_million: 0.075
      output_tokens_per_million: 0.30
    native_sdk: "google-genai"
    notes: >
      Falls back to OpenAI-compatible endpoint if google-genai is not
      installed.  Install the SDK for native structured-output support.

  anthropic:
    name: "Anthropic Claude"
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
    default_model: "claude-sonnet-4-20250514"
    supported_models:
      - "claude-sonnet-4-20250514"
      - "claude-opus-4-20250514"
      - "claude-haiku-4-20250414"
    features:
      vision: true
      streaming: true
      function_calling: true
    pricing:
      input_tokens_per_million: 3.00
      output_tokens_per_million: 15.00
    api_compatible: false
    notes: "Native Anthropic API — requires adapter (use via OpenRouter for now)"

  fireworks:
    name: "Fireworks AI"
    base_url: "https://api.fireworks.ai/inference/v1"
    api_key_env: "FIREWORKS_API_KEY"
    default_model: "accounts/fireworks/models/llama4-maverick-instruct-basic"
    supported_models:
      - "accounts/fireworks/models/llama4-maverick-instruct-basic"
      - "accounts/fireworks/models/qwen2-vl-72b-instruct"
      - "accounts/fireworks/models/llama-v3p2-90b-vision-instruct"
    features:
      vision: true
      streaming: true
      function_calling: true
    pricing:
      input_tokens_per_million: 0.20
      output_tokens_per_million: 0.20
    notes: "Fast inference — OpenAI compatible"

  together:
    name: "Together AI"
    base_url: "https://api.together.xyz/v1"
    api_key_env: "TOGETHER_API_KEY"
    default_model: "Qwen/Qwen2-VL-72B-Instruct"
    supported_models:
      - "Qwen/Qwen2-VL-72B-Instruct"
      - "meta-llama/Llama-3.2-90B-Vision-Instruct"
      - "meta-llama/Llama-3.2-11B-Vision-Instruct"
    features:
      vision: true
      streaming: true
      function_calling: true
    pricing:
      input_tokens_per_million: 0.18
      output_tokens_per_million: 0.18
    notes: "Strong Qwen model support — OpenAI compatible"

# Processing defaults
processing:
  max_retries: 3
  retry_delay_seconds: 2
  default_temperature: 0.1
  default_max_tokens: 2000
  timeout_seconds: 60

# Document handling
documents:
  input_directory: "documents"
  output_directory: "outputs"
  individual_output_directory: "outputs/individual"
  supported_formats:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".bmp"
    - ".tiff"
    - ".webp"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "kyc_processing.log"
  console: true
